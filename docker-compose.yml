services:
  postgres:
    container_name: postgres
    image: quay.io/sclorg/postgresql-16-c9s:latest
    environment:
      POSTGRESQL_USER: todo
      POSTGRESQL_PASSWORD: todo
      POSTGRESQL_DATABASE: todos
    volumes:
      - pg-data:/var/lib/pgsql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432", "-U", "todo", "-d", "todos"]
      interval: 5s
      timeout: 5s
      retries: 20
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 30s

  rabbitmq:
    container_name: rabbitmq
    image: mcr.microsoft.com/azurelinux/base/rabbitmq-server:3
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: app
      RABBITMQ_DEFAULT_PASS: app
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 30s

  todo-service:
    container_name: todo-service
    build:
      context: .
      dockerfile: src/TodoService/Dockerfile
    image: todo-service:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      TODO_DB_CONNECTION: Host=postgres;Port=5432;Database=todos;Username=todo;Password=todo
    ports:
      - "8088:8080"
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 30s

  echo-service:
    container_name: echo-service
    build:
      context: .
      dockerfile: src/EchoService/Dockerfile
    image: echo-service:local
    environment:
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8082:8080"
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 30s

  weather-service:
    container_name: weather-service
    build:
      context: .
      dockerfile: src/WeatherService/Dockerfile
    image: weather-service:local
    environment:
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8084:8080"
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 30s

  order-producer-service:
    container_name: order-producer-service
    build:
      context: .
      dockerfile: src/OrderProducerService/Dockerfile
    image: order-producer-service:local
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: app
      RABBITMQ_PASS: app
      ORDER_PRODUCER_ORDERS_PER_MINUTE: "12"
    ports:
      - "8091:8080"
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 30s

  kitchen-service:
    container_name: kitchen-service
    build:
      context: .
      dockerfile: src/KitchenService/Dockerfile
    image: kitchen-service:local
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: app
      RABBITMQ_PASS: app
      KITCHEN_MIN_PREP_SECONDS: "5"
      KITCHEN_MAX_PREP_SECONDS: "30"
    ports:
      - "8092:8080"
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 30s

  delivery-service:
    container_name: delivery-service
    build:
      context: .
      dockerfile: src/DeliveryService/Dockerfile
    image: delivery-service:local
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: app
      RABBITMQ_PASS: app
      DELIVERY_MIN_SECONDS: "30"
      DELIVERY_MAX_SECONDS: "60"
    ports:
      - "8093:8080"
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 30s

  monitor:
    container_name: monitor
    build:
      context: .
      dockerfile: src/Monitor/Dockerfile
    image: monitor:local
    depends_on:
      - echo-service
      - weather-service
      - todo-service
      - order-producer-service
      - kitchen-service
      - delivery-service
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ORDER_PRODUCER_API: http://order-producer-service:8080
      KITCHEN_API: http://kitchen-service:8080
      DELIVERY_API: http://delivery-service:8080
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 30s

  plain-js-client:
    container_name: plain-js-client
    build:
      context: .
      dockerfile: src/PlainJsClient/Dockerfile
    image: plain-js-client:local
    depends_on:
      - echo-service
      - weather-service
      - todo-service
    ports:
      - "8086:80"
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 30s

  todo-app:
    container_name: todo-app
    build:
      context: .
      dockerfile: src/TodoApp/Dockerfile
    image: todo-app:local
    depends_on:
      - todo-service
    ports:
      - "8087:80"
    init: true
    stop_signal: SIGTERM
    stop_grace_period: 30s

volumes:
  pg-data:
  rabbitmq-data:

