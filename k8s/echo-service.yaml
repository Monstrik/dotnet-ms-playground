apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-service
  namespace: foodorder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-service
  template:
    metadata:
      labels:
        app: echo-service
    spec:
      containers:
        - name: echo-service
          image: echo-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080

---
apiVersion: v1
kind: Service
metadata:
  name: echo-service
  namespace: foodorder
spec:
  selector:
    app: echo-service
  ports:
    - port: 8080
      targetPort: 8080

