apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-producer-service
  namespace: foodorder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-producer-service
  template:
    metadata:
      labels:
        app: order-producer-service
    spec:
      containers:
        - name: order-producer-service
          image: order-producer-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              value: app
            - name: RABBITMQ_PASS
              value: app
            - name: ORDER_PRODUCER_ORDERS_PER_MINUTE
              value: "12"

---
apiVersion: v1
kind: Service
metadata:
  name: order-producer-service
  namespace: foodorder
spec:
  selector:
    app: order-producer-service
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30091
  type: NodePort

