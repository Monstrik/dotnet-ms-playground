apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-service
  namespace: foodorder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-service
  template:
    metadata:
      labels:
        app: todo-service
    spec:
      containers:
        - name: todo-service
          image: todo-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: TODO_DB_CONNECTION
              value: Host=postgres;Port=5432;Database=todos;Username=todo;Password=todo

---
apiVersion: v1
kind: Service
metadata:
  name: todo-service
  namespace: foodorder
spec:
  selector:
    app: todo-service
  ports:
    - port: 8080
      targetPort: 8080

