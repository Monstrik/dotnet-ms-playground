apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
  namespace: foodorder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      containers:
        - name: todo-app
          image: todo-app:local
          imagePullPolicy: Never
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: todo-app
  namespace: foodorder
spec:
  selector:
    app: todo-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30087
  type: NodePort

