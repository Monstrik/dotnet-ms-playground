<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Todo Application</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 2rem;
    }

    h1 {
      margin: 0 0 2rem 0;
      color: #333;
      text-align: center;
      font-size: 2rem;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: #666;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e0e0e0;
      display: inline-block;
    }

    .status-dot.connected {
      background: #4caf50;
    }

    .status-dot.disconnected {
      background: #f44336;
    }

    .input-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.75rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      padding: 0.75rem 1.5rem;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #5568d3;
    }

    button:active {
      background: #4557c0;
    }

    .todos-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: #f5f5f5;
      border-radius: 8px;
      margin-bottom: 0.75rem;
      transition: all 0.3s;
    }

    .todo-item:hover {
      background: #efefef;
      transform: translateX(4px);
    }

    .todo-item.completed {
      opacity: 0.6;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #999;
    }

    .todo-checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .todo-text {
      flex: 1;
      color: #333;
      font-size: 1rem;
    }

    .todo-date {
      font-size: 0.8rem;
      color: #999;
    }

    .todo-delete {
      padding: 0.4rem 0.8rem;
      background: #f44336;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.3s;
    }

    .todo-delete:hover {
      background: #e53935;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #999;
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .error {
      background: #ffebee;
      border: 1px solid #f44336;
      color: #c62828;
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      display: none;
    }

    .error.show {
      display: block;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Todo App</h1>

    <div class="status-indicator">
      <span class="status-dot disconnected" id="statusDot"></span>
      <span id="statusText">Connecting to TodoService...</span>
    </div>

    <div class="error" id="errorMessage"></div>

    <div class="input-group">
      <input type="text" id="todoInput" placeholder="Add a new todo..." />
      <button id="addBtn">Add</button>
    </div>

    <div id="todosContainer">
      <div class="loading">Loading todos...</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
