<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Microservice Client</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 0.5rem; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
    input { width: 100%; padding: 0.5rem; margin-bottom: 0.75rem; box-sizing: border-box; }
    button { padding: 0.5rem 0.9rem; cursor: pointer; }
    pre { background: #f6f8fa; padding: 0.75rem; border-radius: 6px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>Microservice Client</h1>
  <p>Echo API: <code id="apiBase"></code></p>
  <p>Weather API: <code id="weatherApiBase"></code></p>

  <div class="card">
    <h2>Health Check</h2>
    <button id="healthBtn" type="button">GET /health</button>
    <pre id="healthOutput">(click to call)</pre>
  </div>

  <div class="card">
    <h2>Echo (GET)</h2>
    <label for="getMessage">Message</label>
    <input id="getMessage" value="hello-from-browser">
    <button id="echoGetBtn" type="button">GET /echo/{message}</button>
    <pre id="echoGetOutput">(click to call)</pre>
  </div>

  <div class="card">
    <h2>Echo (POST)</h2>
    <label for="postMessage">Message</label>
    <input id="postMessage" value="posted-from-browser">
    <button id="echoPostBtn" type="button">POST /echo</button>
    <pre id="echoPostOutput">(click to call)</pre>
  </div>

  <div class="card">
    <h2>Weather</h2>
    <label for="weatherCity">City</label>
    <input id="weatherCity" value="Seattle">
    <button id="weatherBtn" type="button">GET /weather/{city}</button>
    <pre id="weatherOutput">(click to call)</pre>
  </div>

  <script src="./app.js"></script>
</body>
</html>
